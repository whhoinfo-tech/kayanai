<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kayan AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}

.container {
  max-width:900px;
  margin:auto;
  padding:40px;
  text-align:center;
}

h1 { font-size:40px; }

.card {
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  margin-top:20px;
}

input, button {
  padding:10px;
  margin:10px;
  width:80%;
  border-radius:8px;
  border:none;
}

button {
  background:#3b82f6;
  color:white;
  cursor:pointer;
}

button:hover {
  background:#2563eb;
}

.hidden { display:none; }

.links a {
  margin:10px;
  color:#93c5fd;
}
</style>
</head>

<body>

<div class="container">

<h1>Kayan AI 🚀</h1>
<p>Automate TikTok video publishing بسهولة</p>

<!-- LOGIN -->
<div class="card" id="loginBox">
  <h2>Login</h2>
  <input type="text" placeholder="Username"><br>
  <input type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div class="card hidden" id="dashboard">
  <h2>Upload Video</h2>

  <input type="text" placeholder="Video Title"><br>
  <input type="text" placeholder="Description"><br>
  <input type="file"><br>

  <button onclick="upload()">Publish to TikTok</button>

  <p id="status"></p>
</div>

<div class="links">
  <a href="terms.html">Terms</a>
  <a href="privacy.html">Privacy</a>
</div>

</div>

<script>
function login(){
  document.getElementById("loginBox").style.display="none";
  document.getElementById("dashboard").style.display="block";
}

function upload(){
  document.getElementById("status").innerText =
  "✅ Video sent to TikTok API successfully (simulation)";
}
</script>

</body>
</html>
